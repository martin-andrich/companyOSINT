<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 56" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Icon: Magnifying glass with network nodes -->
  <g transform="translate(4, 4)">
    <!-- Lens circle -->
    <circle cx="20" cy="20" r="16" stroke="url(#iconGrad)" stroke-width="3.5" fill="none"/>
    <!-- Handle -->
    <line x1="32" y1="32" x2="44" y2="44" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Network nodes inside lens -->
    <circle cx="14" cy="16" r="2.5" fill="#4f46e5"/>
    <circle cx="26" cy="14" r="2.5" fill="#6366f1"/>
    <circle cx="20" cy="25" r="2.5" fill="#06b6d4"/>

    <!-- Connections between nodes -->
    <line x1="14" y1="16" x2="26" y2="14" stroke="#4f46e5" stroke-width="1.4" opacity="0.5"/>
    <line x1="14" y1="16" x2="20" y2="25" stroke="#6366f1" stroke-width="1.4" opacity="0.5"/>
    <line x1="26" y1="14" x2="20" y2="25" stroke="#06b6d4" stroke-width="1.4" opacity="0.5"/>
  </g>

  <!-- Text: "CompanyOSINT" -->
  <text x="58" y="38" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5"><tspan fill="currentColor">Company</tspan><tspan fill="url(#iconGrad)">OSINT</tspan></text>
</svg>
