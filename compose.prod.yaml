services:
  companyosint-web:
    build:
      context: .
      dockerfile: companyOSINT.Web/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "${CONNECTION_STRING}"
      ApiKey: "${API_KEY}"
      GraphEmail__TenantId: "${GRAPH_EMAIL_TENANT_ID}"
      GraphEmail__ClientId: "${GRAPH_EMAIL_CLIENT_ID}"
      GraphEmail__ClientSecret: "${GRAPH_EMAIL_CLIENT_SECRET}"
      GraphEmail__SenderEmail: "${GRAPH_EMAIL_SENDER_EMAIL:-noreply@company-osint.com}"
      GraphEmail__SenderName: "${GRAPH_EMAIL_SENDER_NAME:-company-OSINT.com}"
      ContactEmail: "${CONTACT_EMAIL:-info@company-osint.com}"
      Turnstile__SiteKey: "${TURNSTILE_SITE_KEY}"
      Turnstile__SecretKey: "${TURNSTILE_SECRET_KEY}"

  companyosint-worker:
    build:
      context: .
      dockerfile: companyOSINT.Worker/Dockerfile
    restart: unless-stopped
    depends_on:
      companyosint-web:
        condition: service_started
    environment:
      ApiBaseUrl: "http://companyosint-web:8080"
      ApiKey: "${API_KEY}"
      OllamaUrl: "${OLLAMA_URL}"
      OllamaModel: "${OLLAMA_MODEL:-qwen3.5:27b}"
      SerperApiKey: "${SERPER_API_KEY}"
    profiles:
      - worker

  companyosint-import:
    build:
      context: .
      dockerfile: companyOSINT.Import/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./handelsregister.db:/app/handelsregister.db:ro
    command: ["/app/handelsregister.db", "${CONNECTION_STRING}"]
    profiles:
      - import
